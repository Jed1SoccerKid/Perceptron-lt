<!DOCTYPE html>
<html>
<head>
  <title>L vs T Annotator</title>
  <style>
    body {
      background-color: black;
      color: lime;
      font-family: monospace;
      text-align: center;
      padding: 20px;
    }

    h1 {
      font-size: 22px;
      margin-bottom: 6px;
    }

    #counter {
      font-size: 14px;
      color: #aaa;
      margin-bottom: 16px;
    }

    #grid-container {
      display: grid;
      grid-template-columns: repeat(5, 50px);
      grid-template-rows: repeat(5, 50px);
      gap: 4px;
      margin: 10px auto;
      width: fit-content;
    }

    .cell {
      width: 50px;
      height: 50px;
      background-color: #111;
      border: 2px solid green;
      cursor: pointer;
    }

    .cell.on {
      background-color: lime;
    }

    button {
      font-family: monospace;
      font-size: 14px;
      margin: 6px;
      padding: 10px 20px;
      background-color: black;
      color: lime;
      border: 2px solid lime;
      cursor: pointer;
    }

    button:hover {
      background-color: lime;
      color: black;
    }

    #download-btn {
      border-color: yellow;
      color: yellow;
      margin-top: 20px;
    }

    #download-btn:hover {
      background-color: yellow;
      color: black;
    }

    #status {
      font-size: 13px;
      color: #aaa;
      margin-top: 10px;
    }

    #progress {
      font-size: 13px;
      margin-top: 6px;
      color: #aaa;
    }
  </style>
</head>

<body>

  <h1>L vs T Annotator</h1>
  <div id="counter">Sample 1 of 200 — L: 0 &nbsp;|&nbsp; T: 0</div>

  <div id="grid-container"></div>

  <div>
    <button onclick="saveLabel(0)">Save as L</button>
    <button onclick="saveLabel(1)">Save as T</button>
    <button onclick="clearGrid()">Clear</button>
  </div>

  <div id="status">Draw a shape then click Save as L or Save as T</div>

  <br>
  <button id="download-btn" onclick="downloadCSV()">Download CSV</button>
  <div id="progress"></div>

  <script>
    var data = [];
    var lCount = 0;
    var tCount = 0;

    // build grid
    var container = document.getElementById('grid-container');
    for (var i = 0; i < 25; i++) {
      var cell = document.createElement('div');
      cell.className = 'cell';
      cell.addEventListener('click', function() {
        this.classList.toggle('on');
      });
      container.appendChild(cell);
    }

    function getPixels() {
      var cells = document.querySelectorAll('.cell');
      var pixels = [];
      for (var i = 0; i < cells.length; i++) {
        pixels.push(cells[i].classList.contains('on') ? 1 : 0);
      }
      return pixels;
    }

    function clearGrid() {
      var cells = document.querySelectorAll('.cell');
      for (var i = 0; i < cells.length; i++) {
        cells[i].classList.remove('on');
      }
    }

    function saveLabel(label) {
      var pixels = getPixels();
      var total = pixels.reduce(function(a, b) { return a + b; }, 0);

      if (total === 0) {
        document.getElementById('status').innerText = 'Grid is empty! Draw something first.';
        return;
      }

      var row = pixels.concat([label]);
      data.push(row);

      if (label === 0) lCount++;
      else tCount++;

      clearGrid();

      var total_saved = data.length;
      document.getElementById('counter').innerHTML =
        'Sample ' + (total_saved + 1) + ' of 200 &mdash; L: ' + lCount + ' &nbsp;|&nbsp; T: ' + tCount;
      document.getElementById('status').innerText =
        'Saved! ' + total_saved + ' samples so far.';

      if (total_saved >= 200) {
        document.getElementById('status').innerText = 'Done! 200 samples collected. Click Download CSV.';
        document.getElementById('counter').innerText = 'Complete! L: ' + lCount + ' | T: ' + tCount;
      }
    }

    function downloadCSV() {
      if (data.length === 0) {
        alert('No data yet!');
        return;
      }

      var header = [];
      for (var i = 0; i < 25; i++) header.push('p' + i);
      header.push('label');

      var rows = [header.join(',')];
      for (var i = 0; i < data.length; i++) {
        rows.push(data[i].join(','));
      }

      var csv = rows.join('\n');
      var blob = new Blob([csv], { type: 'text/csv' });
      var url = URL.createObjectURL(blob);
      var a = document.createElement('a');
      a.href = url;
      a.download = 'lt_data.csv';
      a.click();

      document.getElementById('progress').innerText =
        'Downloaded! ' + data.length + ' samples saved.';
    }
  </script>

</body>
</html>
